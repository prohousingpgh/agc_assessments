name: Notify dataviz

on:
  push:
    branches: [main]
    paths:
      - "output/**"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger assessments_dataviz data rebuild
        env:
          GH_TOKEN: ${{ secrets.NOTIFY_DATAVIZ_TOKEN }}
          DATAVIZ_REPO: prohousingpgh/assessments_dataviz
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::NOTIFY_DATAVIZ_TOKEN is required and must have permission to create repository_dispatch events in ${DATAVIZ_REPO}."
            exit 1
          fi

          gh api "repos/${DATAVIZ_REPO}/dispatches" \
            --method POST \
            -f event_type=agc_output_updated \
            -f client_payload[source_repository]=${{ github.repository }} \
            -f client_payload[source_ref]=${{ github.ref_name }} \
            -f client_payload[source_sha]=${{ github.sha }}
